

services:
  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gravspace-core
    restart: unless-stopped
    ports:
      - "${PUBLISH_IP:-0.0.0.0}:${BACKEND_PORT:-8080}:8080"
      - "${PUBLISH_IP:-0.0.0.0}:${S3_PORT:-9000}:9000"
    environment:
      # Required
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # Database (Optional - defaults to local SQLite)
      - DATABASE_URL=${DATABASE_URL:-}
      - TURSO_DATABASE_URL=${TURSO_DATABASE_URL:-}
      - DATABASE_AUTH_TOKEN=${DATABASE_AUTH_TOKEN:-}
      - TURSO_AUTH_TOKEN=${TURSO_AUTH_TOKEN:-}
      # Initial Admin (Optional)
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-}
      - INITIAL_ADMIN_ACCESS_KEY=${INITIAL_ADMIN_ACCESS_KEY:-}
      - INITIAL_ADMIN_SECRET_KEY=${INITIAL_ADMIN_SECRET_KEY:-}
      # Encryption (Optional)
      - SSE_MASTER_KEY=${SSE_MASTER_KEY:-}
      # Worker Intervals (Optional)
      - SYNC_WORKER_INTERVAL=${SYNC_WORKER_INTERVAL:-5m}
      - LIFECYCLE_WORKER_INTERVAL=${LIFECYCLE_WORKER_INTERVAL:-1h}
      # Redis Configuration
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
    volumes:
      - storage_data:/app/data
      - storage_db:/app/db
      - storage_logs:/app/logs
    networks:
      - gravspace-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "healthcheck"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # Redis Service
  redis:
    image: redis:alpine
    container_name: gravspace-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - gravspace-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5


  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gravspace-ui
    restart: unless-stopped
    ports:
      - "${PUBLISH_IP:-0.0.0.0}:${FRONTEND_PORT:-3000}:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-/api}
      - NUXT_BACKEND_URL=${NUXT_BACKEND_URL:-http://localhost:8080}
      - VITE_API_BASE=${NUXT_PUBLIC_API_BASE:-/api}
      - VITE_WS_BASE=${VITE_WS_BASE:-}
      - SERVER_URL=${NUXT_BACKEND_URL:-http://gravspace-core:8080}
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gravspace-network
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.status === 200 ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  gravspace-network:
    driver: bridge

volumes:
  storage_data:
    driver: local
  storage_db:
    driver: local
  storage_logs:
    driver: local

